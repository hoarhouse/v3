<text font-size="14" font-weight="500" x="340" y="82" text-anchor="middle" fill="#3C3489">Core parish record</text>
<text font-size="12" x="340" y="100" text-anchor="middle" fill="#534AB7">Name · location · contact · photo</text>
<text font-size="12" x="340" y="116" text-anchor="middle" fill="#534AB7">Focus tags · diocese · Stripe ID</text>
<text font-size="11" x="340" y="148" text-anchor="middle" fill="#888">Single source of truth · edited in Settings</text>

<!-- COMMUNIO PROFILE -->
<rect x="30" y="200" width="210" height="80" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
