<text font-size="12" x="545" y="266" text-anchor="middle" fill="#993C1D">stmarysnyc.communio.org</text>

<!-- Arrows core → profile and core → website -->
<line x1="260" y1="140" x2="175" y2="198" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="420" y1="140" x2="505" y2="198" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" x="192" y="172" text-anchor="middle" fill="#888">feeds into</text>
<text font-size="11" x="492" y="172" text-anchor="middle" fill="#888">feeds into</text>

