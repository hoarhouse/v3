<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Website Builder — Communio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../communio.css">
<style>
/* ── LAYOUT SHELL ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}

/* ── TOP NAV ── */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:300;height:52px;background:var(--ink);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 20px;gap:0}
.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;width:220px;flex-shrink:0}
.nav-mark{width:28px;height:28px;background:var(--terra);border-radius:6px;display:flex;align-items:center;justify-content:center}
.nav-mark svg{width:14px;height:14px}
.nav-wm{font-size:16px;font-weight:800;color:var(--white);letter-spacing:-.02em}
.nav-wm span{color:var(--terra)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-notif{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);text-decoration:none;position:relative;transition:color .2s}
.nav-notif:hover{color:white;background:rgba(255,255,255,.06)}
.nav-notif svg{width:17px;height:17px}
.notif-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:var(--terra);border-radius:50%;border:1.5px solid var(--ink)}
.nav-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 12px 4px 4px;text-decoration:none;transition:all .2s}
.nav-pill:hover{background:rgba(255,255,255,.12)}
.nav-av{width:26px;height:26px;background:var(--terra);border-radius:50%;font-size:10px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center}
.nav-pname{font-size:13px;font-weight:600;color:var(--white)}

/* ── SIDEBAR ── */
.sidebar{position:fixed;top:52px;left:0;bottom:0;width:220px;background:var(--white);border-right:1px solid var(--border-light);display:flex;flex-direction:column;overflow-y:auto;z-index:200}
.sb-parish{padding:18px 16px;border-bottom:1px solid var(--border-light);display:flex;flex-direction:column;align-items:flex-start;gap:3px}
.sb-av{width:38px;height:38px;background:var(--terra);border-radius:9px;font-size:13px;font-weight:800;color:white;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.sb-name{font-size:13px;font-weight:700;color:var(--ink);line-height:1.2}
.sb-loc{font-size:11px;color:var(--light)}
.sb-nav{flex:1;padding:10px 8px}
.sb-sec{font-size:10px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:.08em;padding:12px 8px 6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;text-decoration:none;color:var(--text-mid);font-size:13px;font-weight:500;transition:all .18s;position:relative;margin-bottom:1px}
.sb-item svg{width:15px;height:15px;flex-shrink:0;opacity:.6}
.sb-item:hover{background:var(--cream);color:var(--ink)}
.sb-item:hover svg{opacity:1}
.sb-item.active{background:var(--terra-pale);color:var(--terra);font-weight:600}
.sb-item.active svg{opacity:1;color:var(--terra)}
.sb-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--terra);border-radius:0 3px 3px 0}
.sb-badge{margin-left:auto;background:var(--terra);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sb-badge-sage{background:var(--sage)}
.sb-foot{padding:12px 16px;border-top:1px solid var(--border-light)}
.sb-foot a{font-size:12px;color:var(--light);text-decoration:none;display:flex;align-items:center;gap:6px}
.sb-foot a:hover{color:var(--ink)}
.sb-foot svg{width:13px;height:13px}

/* ── PAGE SHELL ── */
.page-shell{margin-left:220px;padding-top:52px;min-height:100vh}
.page-inner{max-width:1060px;margin:0 auto;padding:32px 28px}

/* ── PAGE HEADER ── */
.pg-hd{margin-bottom:28px}
.pg-greeting{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1.1}
.pg-greeting em{font-family:'Lora',serif;font-style:italic;font-weight:400;color:var(--terra)}
.pg-sub{font-size:13px;color:var(--light);margin-top:4px}

/* ── SETUP BANNER ── */
.setup-banner{background:var(--white);border:1px solid var(--border-light);border-left:4px solid var(--terra);border-radius:var(--r-lg);padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:24px;box-shadow:var(--sh-sm)}
.setup-text{flex:1}
.setup-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.setup-sub{font-size:12px;color:var(--light)}
.setup-bar{height:4px;background:var(--cream-dark);border-radius:4px;margin-top:8px;overflow:hidden}
.setup-fill{height:100%;width:60%;background:var(--terra);border-radius:4px}

/* ── MAIN GRID ── */
.home-grid{display:grid;grid-template-columns:1fr 280px;gap:22px;align-items:start}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.sc{background:var(--white);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.sc-terra::before{background:var(--terra)}
.sc-sage::before{background:var(--sage)}
.sc-amber::before{background:var(--amber)}
.sc-ink::before{background:var(--ink)}
.sc-val{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-.035em;line-height:1}
.sc-lbl{font-family:'Lora',serif;font-size:12px;color:var(--light);margin-top:3px;font-style:italic}
.sc-delta{font-size:11px;font-weight:600;margin-top:8px;display:inline-flex;align-items:center;gap:3px}
.sc-delta.up{color:var(--sage)}
.sc-delta.new{color:var(--terra)}

/* ── CHART CARD ── */
.chart-card{background:var(--white);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:22px;margin-bottom:22px;box-shadow:var(--sh-sm)}
.chart-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.chart-title{font-size:14px;font-weight:700;color:var(--ink)}
.chart-range{font-size:11px;color:var(--light)}
.chart-total{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.03em}
.chart-total span{font-family:'Lora',serif;font-size:12px;font-weight:400;color:var(--light);font-style:italic;margin-left:4px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar-amt{font-size:10px;color:var(--light);font-weight:500}
.bar-fill{width:100%;border-radius:4px 4px 0 0;background:var(--terra-pale);transition:.3s}
.bar-fill.current{background:var(--terra)}
.bar-lbl{font-size:10px;color:var(--light)}

/* ── ACTIVITY FEED ── */
.section-title{font-size:11px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.act-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-light)}
.act-item:last-child{border-bottom:none}
.act-dot{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--cream)}
.act-body{flex:1}
.act-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:1px}
.act-sub{font-family:'Lora',serif;font-size:12px;color:var(--light);font-style:italic}
.act-time{font-size:11px;color:var(--light);margin-top:3px}
.act-wrap{background:var(--white);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:16px 20px;box-shadow:var(--sh-sm)}

/* ── SIDEBAR CARDS ── */
.sb-card{background:var(--white);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh-sm);margin-bottom:14px}
.sb-card-title{font-size:11px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.profile-preview{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.pp-av{width:40px;height:40px;background:var(--terra);border-radius:9px;font-size:13px;font-weight:800;color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pp-name{font-size:13px;font-weight:700;color:var(--ink)}
.pp-url{font-size:11px;color:var(--light)}
.pp-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.pp-meta{font-family:'Lora',serif;font-size:12px;color:var(--text-mid);font-style:italic;margin-bottom:12px;line-height:1.4}
.notif-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border-light)}
.notif-item:last-child{border-bottom:none}
.ni-av{width:28px;height:28px;border-radius:6px;flex-shrink:0;font-size:9px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center}
.ni-text{font-size:12px;color:var(--ink);line-height:1.35}
.ni-time{font-size:10px;color:var(--light);margin-top:2px}
.cta-strip{background:var(--ink);border-radius:var(--r-lg);padding:16px;margin-bottom:14px}
.cta-strip-title{font-size:13px;font-weight:700;color:var(--white);margin-bottom:3px}
.cta-strip-sub{font-family:'Lora',serif;font-size:12px;color:rgba(255,253,245,.45);font-style:italic;margin-bottom:12px;line-height:1.4}

@media(max-width:900px){
  .home-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr 1fr}
  .sidebar{display:none}
  .page-shell{margin-left:0}
}
.pg-sub{font-size:.85rem;color:#6b5c4e;margin-top:.2rem;}
.wb-layout{display:flex;gap:0;height:calc(100vh - 140px);border:1px solid #e8e2d6;border-radius:12px;overflow:hidden;background:#fff;}
.wb-sections{width:260px;min-width:260px;border-right:1px solid #e8e2d6;background:#faf8f4;overflow-y:auto;}
.wb-section-item{display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.wb-section-item:hover{background:#f0ebe0;}
.wb-section-item.wb-active{background:#fff;border-left-color:#d85020;}
.wb-section-icon{font-size:1.2rem;width:24px;text-align:center;}
.wb-section-info{flex:1;}
.wb-section-name{font-size:.9rem;font-weight:600;color:#0e0a06;}
.wb-section-status{font-size:.75rem;margin-top:.15rem;}
.wb-status-empty{color:#a89880;}
.wb-status-live{color:#2a8a4a;}
.wb-section-arrow{color:#c4b8a8;font-size:1.1rem;}
.wb-editor{flex:1;overflow-y:auto;padding:2rem;}
.wb-editor-inner{display:block;}
.wb-hidden{display:none!important;}
.wb-editor-hd{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid #e8e2d6;}
.wb-editor-title{font-size:1.3rem;font-weight:700;color:#0e0a06;}
.wb-editor-desc{font-size:.875rem;color:#6b5c4e;margin-top:.4rem;line-height:1.5;}
.wb-field-group{margin-bottom:1.25rem;}
.wb-field-label{font-size:.8rem;font-weight:600;color:#4a3f35;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em;}
.wb-input{width:100%;padding:.6rem .85rem;border:1.5px solid #ddd6c8;border-radius:8px;font-size:.9rem;color:#0e0a06;background:#fff;box-sizing:border-box;font-family:inherit;}
.wb-input:focus{outline:none;border-color:#d85020;}
.wb-textarea{width:100%;padding:.6rem .85rem;border:1.5px solid #ddd6c8;border-radius:8px;font-size:.9rem;color:#0e0a06;background:#fff;box-sizing:border-box;font-family:inherit;min-height:90px;resize:vertical;}
.wb-textarea-sm{min-height:60px;}
.wb-textarea:focus{outline:none;border-color:#d85020;}
.wb-field-row{display:flex;gap:1rem;}
.wb-field-half{flex:1;}
.wb-save-btn{background:#d85020;color:#fff;border:none;padding:.7rem 1.5rem;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;margin-top:.5rem;font-family:inherit;}
.wb-save-btn:hover{background:#c04418;}
.wb-add-btn{background:transparent;color:#d85020;border:1.5px solid #d85020;padding:.55rem 1.25rem;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;margin-bottom:1rem;font-family:inherit;display:block;}
.wb-staff-item{background:#faf8f4;border:1px solid #e8e2d6;border-radius:10px;padding:1rem;margin-bottom:1rem;}
.wb-upload-area{border:2px dashed #ddd6c8;border-radius:10px;padding:2.5rem;text-align:center;cursor:pointer;transition:border-color .15s;position:relative;}
.wb-upload-area:hover{border-color:#d85020;}
.wb-upload-icon{font-size:2rem;margin-bottom:.5rem;}
.wb-upload-label{font-weight:600;color:#0e0a06;font-size:.95rem;}
.wb-upload-sub{font-size:.85rem;color:#6b5c4e;margin-top:.25rem;}
.wb-upload-link{color:#d85020;cursor:pointer;text-decoration:underline;}
.wb-file-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.wb-statusbar{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;background:#fff;border:1px solid #e8e2d6;border-radius:10px;margin-bottom:1rem;}.wb-status-left{display:flex;align-items:center;gap:.75rem;}.wb-site-url{font-size:.875rem;font-weight:600;color:#0e0a06;}.wb-site-badge{font-size:.75rem;font-weight:600;padding:.2rem .6rem;border-radius:20px;}.wb-badge-live{background:#e6f4eb;color:#2a8a4a;}.wb-view-btn{font-size:.85rem;font-weight:600;color:#d85020;text-decoration:none;border:1.5px solid #d85020;padding:.4rem .9rem;border-radius:7px;}.wb-view-btn:hover{background:#d85020;color:#fff;}.wb-section-divider{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#a89880;padding:.75rem 1.25rem .25rem;}.wb-disabled{opacity:.5;cursor:not-allowed;}.wb-disabled:hover{background:transparent;}.wb-status-soon{color:#a89880;}

00;}

ight:600;color:#0e0a06;}.pvw-media-sub{font-size:.78rem;color:#6b5c4e;margin-top:.1rem;}
.wb-readonly-block{padding:1rem;background:#faf8f4;border-radius:8px;}.wb-readonly-label{font-size:.8rem;font-weight:600;color:#6b5c4e;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.25rem;margin-top:1rem;}.wb-readonly-label:first-child{margin-top:0;}.wb-readonly-value{font-size:.9rem;color:#0e0a06;margin-bottom:.5rem;}.wb-edit-link{display:inline-block;margin-top:1rem;color:#d85020;font-size:.85rem;font-weight:600;text-decoration:none;}.wb-edit-link:hover{text-decoration:underline;}.wb-field-hint{font-size:.82rem;color:#6b5c4e;margin-bottom:1rem;}
</style>
