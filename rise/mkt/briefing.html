<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vigil - E-Group Marketing Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#080808;color:#EEE;min-height:100vh}
.topbar{background:#0A0A0A;border-bottom:1px solid #1A1A1A;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:24px}
.logo{font-size:18px;font-weight:900;color:#C8A96E;letter-spacing:-0.5px}
.vigil-name{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#444}
.nav-links{display:flex;gap:4px}
.nav-link{padding:6px 12px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#555;text-decoration:none;border-radius:4px}
.nav-link:hover{color:#999}
.nav-link.active{color:#C8A96E}
.cost-bar{display:flex;align-items:center;gap:20px;cursor:pointer;position:relative}
.cost-item{display:flex;flex-direction:column;align-items:flex-end}
.cost-val{font-size:13px;font-weight:600;color:#C8A96E}
.cost-lbl{font-size:9px;color:#444;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.cost-panel{display:none;position:absolute;top:52px;right:0;background:#0D0D0D;border:1px solid #1A1A1A;border-radius:8px;width:360px;padding:16px;z-index:200;max-height:400px;overflow-y:auto}
.cost-panel.open{display:block}
.cost-log-item{display:flex;justify-content:space-between;font-size:12px;color:#888;padding:6px 0;border-bottom:1px solid #141414}
.cost-log-item:last-child{border-bottom:none}
.cost-log-amt{color:#C8A96E;font-weight:600;flex-shrink:0;margin-left:12px}
.container{max-width:1000px;margin:0 auto;padding:32px}
.vigil-header{margin-bottom:28px}
.vigil-title{font-size:28px;font-weight:700;color:#EEE;margin-bottom:4px}
.vigil-sub{font-size:13px;color:#555}
.btn-row{display:flex;gap:10px;align-items:center;margin-bottom:20px}
.run-btn{padding:10px 24px;background:#C8A96E;color:#000;font-size:13px;font-weight:700;border:none;border-radius:6px;cursor:pointer;letter-spacing:0.5px}
.run-btn:hover{background:#D4B87E}
.run-btn:disabled{opacity:0.5;cursor:not-allowed}
.research-btn{padding:10px 24px;background:transparent;color:#C8A96E;font-size:13px;font-weight:700;border:1px solid #C8A96E;border-radius:6px;cursor:pointer;letter-spacing:0.5px}
.research-btn:hover{background:#1A1408}
.research-btn:disabled{opacity:0.5;cursor:not-allowed}
.sync-status{font-size:12px;color:#555}
.thinking-box{background:#0D0D0D;border:1px solid #1A1A1A;border-radius:8px;padding:20px;margin-bottom:24px;display:none}
.thinking-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:8px}
.thinking-text{font-size:12px;color:#555;line-height:1.6;font-style:italic}
.insight-card{background:#111;border:1px solid #1A1A1A;border-radius:8px;margin-bottom:12px;overflow:hidden}
.insight-head{padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer}
.insight-head:hover{background:#141414}
.insight-body{display:none;padding:0 20px 20px;border-top:1px solid #141414}
.insight-body.open{display:block}
.act-btn{padding:7px 14px;font-size:12px;border:1px solid #2A2A2A;border-radius:4px;background:transparent;cursor:pointer;color:#888}
.act-btn:hover{border-color:#C8A96E;color:#C8A96E}
.act-btn.primary{background:#C8A96E;border-color:#C8A96E;color:#000;font-weight:600}
.act-btn.danger{border-color:#E24B4A;color:#E24B4A}
.act-btn.approved{background:#4ADE80;border-color:#4ADE80;color:#000;font-weight:600}
.log-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center}
.log-modal.open{display:flex}
.log-box{background:#0D0D0D;border:1px solid #2A2A2A;border-radius:10px;padding:24px;width:500px;max-width:90vw}
.log-box h3{font-size:16px;color:#EEE;margin-bottom:16px}
.log-textarea{width:100%;padding:10px 12px;background:#111;border:1px solid #2A2A2A;border-radius:5px;color:#EEE;font-size:13px;line-height:1.6;min-height:100px;resize:vertical;font-family:inherit}
.log-select{width:100%;padding:8px 12px;background:#111;border:1px solid #2A2A2A;border-radius:5px;color:#EEE;font-size:13px;margin-bottom:10px}
.log-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.memory-section{background:#0D0D0D;border:1px solid #1A1A1A;border-radius:8px;padding:16px;margin-top:32px}
.memory-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:12px}
.memory-stat{display:flex;justify-content:space-between;font-size:12px;color:#666;padding:4px 0;border-bottom:1px solid #0F0F0F}
.memory-stat:last-child{border-bottom:none}
.memory-val{color:#888}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div>
      <div class="logo">VIGIL</div>
      <div class="vigil-name">E-Group Intelligence</div>
    </div>
    <nav class="nav-links">
      <a href="briefing.html" class="nav-link active">Briefing</a>
      <a href="network.html" class="nav-link">Network</a>
      <a href="intelligence.html" class="nav-link">Intelligence</a>
      <a href="pipeline.html" class="nav-link">Pipeline</a>
    </nav>
  </div>
  <div style="position:relative">
    <div class="cost-bar" onclick="toggleCostPanel()">
      <div class="cost-item"><div class="cost-val" id="cost-session">$0.0000</div><div class="cost-lbl">Session</div></div>
      <div class="cost-item"><div class="cost-val" id="cost-month">$0.0000</div><div class="cost-lbl">Month</div></div>
      <div class="cost-item"><div class="cost-val" id="cost-total">$0.0000</div><div class="cost-lbl">All time</div></div>
    </div>
    <div class="cost-panel" id="cost-panel">
      <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:10px">API Cost Log</div>
      <div id="cost-log"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="vigil-header">
    <div class="vigil-title">Good morning, Chris.</div>
    <div class="vigil-sub" id="vigil-date"></div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <div class="sync-status" id="sync-status">Ready</div>
    <div class="btn-row">
      <button class="research-btn" id="research-btn" onclick="runResearchAgent()">Research Agent</button>
      <button class="run-btn" id="run-btn" onclick="runBriefing()">Run Vigil Briefing</button>
    </div>
  </div>

  <div class="thinking-box" id="thinking-box">
    <div class="thinking-label">Vigil is thinking...</div>
    <div class="thinking-text" id="thinking-text">Loading...</div>
  </div>

  <div id="briefing-output"></div>
  <div id="research-output"></div>

  <div class="memory-section">
    <div class="memory-title">Vigil Memory</div>
    <div id="memory-stats"></div>
  </div>
</div>

<div class="log-modal" id="log-modal">
  <div class="log-box">
    <h3 id="log-title">Log action</h3>
    <select class="log-select" id="log-outcome">
      <option value="acted_positive">Acted on this - positive response</option>
      <option value="acted_neutral">Acted on this - no response yet</option>
      <option value="acted_negative">Acted on this - negative response</option>
      <option value="dismissed_valid">Dismissed - not relevant right now</option>
      <option value="dismissed_wrong">Dismissed - Vigil reasoning was wrong</option>
      <option value="snoozed">Snooze for 30 days</option>
    </select>
    <textarea class="log-textarea" id="log-notes" placeholder="What happened? What did you do? What was the response?"></textarea>
    <div class="log-actions">
      <button class="act-btn" onclick="closeLogModal()">Cancel</button>
      <button class="act-btn primary" onclick="saveLog()">Save to Memory</button>
    </div>
  </div>
</div>

<script>
var PROXY = 'http://localhost:3000';
var DATA_URL = 'https://hoarhouse.github.io/v3/rise/mkt/data.json';
var COST_KEY = 'vigil-cost-v1';
var MEMORY_KEY = 'vigil-memory-v1';
var DATA_CACHE_KEY = 'vigil-data-cache-v1';
var WEBSITE_URL = 'https://hoarhouse.github.io/v3/rise/mkt/website.json';
var WEBSITE_CACHE_KEY = 'vigil-website-cache-v1';
var INPUT_PRICE = 3.00 / 1000000;
var OUTPUT_PRICE = 15.00 / 1000000;

var costs = { session: 0, month: 0, total: 0, log: [] };
var memory = { sessions: [], insights: [], feedback: [], patterns: [], created: new Date().toISOString() };
var knowledgeData = null;
var logTarget = null;
var researchPlan = null;
var approvedTasks = [];

function init() {
  document.getElementById('vigil-date').textContent = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  loadCosts();
  loadMemory();
  renderCosts();
  renderMemoryStats();
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.cost-bar') && !e.target.closest('.cost-panel')) {
      document.getElementById('cost-panel').classList.remove('open');
    }
    var modal = document.getElementById('log-modal');
    if (modal.classList.contains('open') && e.target === modal) closeLogModal();
  });
}

function loadCosts() {
  try {
    var r = localStorage.getItem(COST_KEY);
    if (r) {
      var saved = JSON.parse(r);
      costs.total = saved.total || 0;
      costs.log = saved.log || [];
      var thisMonth = new Date().toISOString().slice(0,7);
      costs.month = costs.log.filter(function(l){ return l.ts && l.ts.startsWith(thisMonth); }).reduce(function(s,l){ return s + l.cost; }, 0);
    }
  } catch(e) {}
}

function saveCosts() {
  localStorage.setItem(COST_KEY, JSON.stringify({ total: costs.total, log: costs.log.slice(-500) }));
}

function trackCost(label, inp, out) {
  var cost = (inp * INPUT_PRICE) + (out * OUTPUT_PRICE);
  costs.session += cost; costs.month += cost; costs.total += cost;
  costs.log.push({ ts: new Date().toISOString(), label: label, inp: inp, out: out, cost: cost });
  saveCosts(); renderCosts();
  return cost;
}

function fmt(n) { return '$' + n.toFixed(4); }

function renderCosts() {
  document.getElementById('cost-session').textContent = fmt(costs.session);
  document.getElementById('cost-month').textContent = fmt(costs.month);
  document.getElementById('cost-total').textContent = fmt(costs.total);
  var recent = costs.log.slice(-15).reverse();
  document.getElementById('cost-log').innerHTML = recent.length
    ? recent.map(function(l){ return '<div class="cost-log-item"><div><div style="color:#CCC;font-size:12px">' + l.label + '</div><div style="color:#444;font-size:11px">' + new Date(l.ts).toLocaleTimeString() + ' - ' + l.inp + 'in / ' + l.out + 'out</div></div><div class="cost-log-amt">' + fmt(l.cost) + '</div></div>'; }).join('')
    : '<div style="font-size:12px;color:#444;padding:8px 0">No calls yet</div>';
}

function toggleCostPanel() { document.getElementById('cost-panel').classList.toggle('open'); }

function loadMemory() {
  try {
    var r = localStorage.getItem(MEMORY_KEY);
    if (r) memory = JSON.parse(r);
  } catch(e) {}
}

function saveMemory() { localStorage.setItem(MEMORY_KEY, JSON.stringify(memory)); }

function renderMemoryStats() {
  var stats = document.getElementById('memory-stats');
  var actedOn = memory.feedback.filter(function(f){ return f.outcome && f.outcome.startsWith('acted'); }).length;
  var dismissed = memory.feedback.filter(function(f){ return f.outcome && f.outcome.startsWith('dismissed'); }).length;
  var lastSession = memory.sessions[memory.sessions.length - 1];
  stats.innerHTML = [
    ['Total Vigil sessions', memory.sessions.length || 0],
    ['Insights logged', memory.insights.length || 0],
    ['Feedback entries', memory.feedback.length || 0],
    ['Actions taken', actedOn || 0],
    ['Insights dismissed', dismissed || 0],
    ['Last session', lastSession ? new Date(lastSession.date).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) : 'First session today']
  ].map(function(pair){ return '<div class="memory-stat"><span>' + pair[0] + '</span><span class="memory-val">' + pair[1] + '</span></div>'; }).join('');
}

function buildMemoryContext() {
  if (!memory.sessions.length) return 'This is the first Vigil session. No prior memory exists.';
  var recentFeedback = memory.feedback.slice(-20);
  var patterns = memory.patterns.slice(-10);
  var recentSessions = memory.sessions.slice(-5);
  var ctx = 'VIGIL MEMORY - ' + memory.sessions.length + ' prior sessions.\n\n';
  if (recentFeedback.length) {
    ctx += 'FEEDBACK ON PAST INSIGHTS:\n';
    recentFeedback.forEach(function(f){ ctx += '- [' + f.outcome + '] "' + f.insightTitle + '" - ' + (f.notes || 'no notes') + '\n'; });
    ctx += '\n';
  }
  if (patterns.length) {
    ctx += 'PATTERNS NOTICED:\n';
    patterns.forEach(function(p){ ctx += '- ' + p + '\n'; });
    ctx += '\n';
  }
  if (recentSessions.length) {
    ctx += 'RECENT SESSIONS:\n';
    recentSessions.forEach(function(s){ ctx += '- ' + new Date(s.date).toLocaleDateString() + ': ' + s.summary + '\n'; });
  }
  return ctx;
}

function loadKnowledgeData() {
  return new Promise(function(resolve) {
    try {
      var cached = localStorage.getItem(DATA_CACHE_KEY);
      if (cached) {
        var parsed = JSON.parse(cached);
        if (Date.now() - parsed.ts < 3600000) { resolve(parsed.data); return; }
      }
    } catch(e) {}
    fetch(DATA_URL + '?v=' + Date.now())
      .then(function(r){ return r.json(); })
      .then(function(data){
        localStorage.setItem(DATA_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data }));
        resolve(data);
      })
      .catch(function(){ resolve(null); });
  });
}

function loadWebsiteData(){return new Promise(function(resolve){try{var c=localStorage.getItem(WEBSITE_CACHE_KEY);if(c){var p=JSON.parse(c);if(Date.now()-p.ts<3600000){resolve(p.data);return;}}}catch(e){}fetch(WEBSITE_URL+'?v='+Date.now()).then(function(r){return r.json();}).then(function(d){localStorage.setItem(WEBSITE_CACHE_KEY,JSON.stringify({ts:Date.now(),data:d}));resolve(d);}).catch(function(){resolve(null);});});}
function buildWebsiteContext(w){if(!w)return 'Website audit not available.';var ctx='WEBSITE AUDIT ('+w.lastAudited+')\nGLOBAL GAPS:\n';(w.globalGaps||[]).forEach(function(g){ctx+='- '+g+'\n';});ctx+='\nPRIORITY UPDATES:\n';(w.priorityUpdates||[]).forEach(function(u){ctx+='['+u.priority.toUpperCase()+'] '+u.page+': '+u.action+'\n';});(w.pages||[]).forEach(function(p){ctx+='\n['+p.title+'] Missing: '+(p.missing||[]).join('; ')+'\n';});return ctx;}
function buildDataContext(d) {
  var companies = (d.companies || []).map(function(c){ return '[' + c.id + '] ' + c.name + ' (' + c.type + ', ' + c.country + ') - Connection: ' + c.connection + ' - Opportunity: ' + c.opportunity; }).join('\n');
  var people = (d.people || []).map(function(p){ return '[' + p.id + '] ' + p.name + ', ' + p.title + ' at ' + p.company + ' (warmth: ' + p.warmth + ') - ' + p.connection + ' - Action: ' + p.action; }).join('\n');
  var consortiums = (d.consortiums || []).map(function(c){ return '[' + c.id + '] ' + c.name + ' - Role: ' + c.role + ' - ' + c.notes; }).join('\n');
  var events = (d.events || []).sort(function(a,b){ return new Date(b.date) - new Date(a.date); }).map(function(e){ return '[' + e.date + '] [' + e.type.toUpperCase() + '] ' + e.description + ' (Source: ' + e.source + ')'; }).join('\n');
  var actions = (d.actions || []).filter(function(a){ return a.status === 'pending'; }).map(function(a){ return '[' + a.priority.toUpperCase() + '] ' + a.task + ' - Owner: ' + a.owner; }).join('\n');
  var competitors = (d.competitors || []).map(function(c){ return '[' + c.id + '] ' + c.name + ' (' + c.country + ', ' + c.sector + ', threat: ' + c.threat + ') - ' + c.description + ' - Differentiator: ' + c.differentiator; }).join('\n');
  return 'COMPANIES:\n' + companies + '\n\nPEOPLE:\n' + people + '\n\nCONSORTIUMS:\n' + consortiums + '\n\nEVENTS:\n' + events + '\n\nACTIONS:\n' + actions + '\n\nCOMPETITORS:\n' + competitors;
}

function setThinking(text) { document.getElementById('thinking-text').textContent = text; }

function runBriefing() {
  var btn = document.getElementById('run-btn');
  var thinkingBox = document.getElementById('thinking-box');
  var output = document.getElementById('briefing-output');
  btn.disabled = true; btn.textContent = 'Running...';
  thinkingBox.style.display = 'block';
  output.innerHTML = '';
  setThinking('Loading knowledge graph...');

  loadKnowledgeData().then(function(data) {
    if (!data) {
      output.innerHTML = '<div style="color:#E24B4A;padding:20px">Failed to load data.json</div>';
      btn.disabled = false; btn.textContent = 'Run Vigil Briefing';
      thinkingBox.style.display = 'none';
      return;
    }
    knowledgeData = data;
    setThinking('Building briefing prompt...');
    var memCtx = buildMemoryContext();
    var dataCtx = buildDataContext(data);
    var today = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

    var prompt = 'You are Vigil, Deputy Chief Marketing Officer for E-Group ICT Software Zrt. You report to Chris Hoar who leads E-Group marketing strategy.\n\n' +
      'Chris job: build pipeline of new enterprise clients across EU/USA/China, manage ~20 existing clients, execute marketing strategy, oversee Vigil platform and E-Group website, work with Antal Kuthy (CEO) and Feri (COO).\n\n' +
      'E-Group: Budapest-based AI infrastructure company, est.1993, 110+ staff, 50 AI engineers. Products: Rise AI platform (in pilot), Essence organisational intelligence, MyD Wallet (Hungarys national EUDI Wallet), KAU national digital identity, GraDPaLM medical AI. Key clients: ESA (photo verification), Hungarian Government (KAU + neonatal tracking). Consortium positions: Co-leads IPCEI-CIS WS3 + AI Cluster, DOME member, HeliX spearhead, eIDAS MyD implementer. Partner: Kellton (MoU signed).\n\n' +
      'Today: ' + today + '\n\n' +
      'KNOWLEDGE BASE:\n' + dataCtx + '\n\n' +
      'THE E-GROUP WEBSITE (current content + gaps):\n' + websiteCtx + '\n\n' +
      'MEMORY:\n' + memCtx + '\n\n' +
      'Produce a structured morning briefing. Be direct, honest, specific. Re-evaluate everything fresh - do not assume prior signals are still valid.\n\n' +
      'Respond ONLY with valid JSON:\n' +
      '{"stateOfPlay":{"summary":"2-3 sentence honest macro assessment","confidence":"high|medium|low","confidenceReason":"why"},' +
      '"acquisitions":[{"target":"name","goal":"what we want","status":"not_started|in_progress|responded|meeting_set|proposal_sent|stalled|won|lost","daysSinceActivity":0,"lastActivity":"what happened","vigil_assessment":"Vigils honest read","nextAction":"specific action who does what by when","urgency":"high|medium|low|drop","facts":[{"text":"fact","source":"where","confidence":"verified|assumed|stale"}],"wouldChangeIf":["what would change this"]}],' +
      '"marketIntelligence":[{"title":"thing Chris needs to know","why_it_matters":"direct relevance to E-Group","source":"where","date":"when","action":"optional action"}],' +
      '"projects":[{"name":"project name","status":"on_track|needs_attention|blocked|completed","oneLineSummary":"one sentence","blockingIssue":"null or blocker"}],' +
      '"decisionsNeeded":[{"decision":"specific decision","context":"why","deadline":"by when"}],' +
      '"vigilConcern":{"title":"overlooked thing","detail":"2-3 sentences","basis":"evidence"},"websiteGaps":[{"priority":"critical|high|medium","page":"page url","gap":"what is missing","suggestedCopy":"draft the actual copy","rationale":"why this matters"}],' +
      '"memoryUpdate":"what to remember for next session"}';

    setThinking('Vigil is reasoning about E-Group situation...');

    fetch(PROXY + '/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 4000, messages: [{ role: 'user', content: prompt }] })
    })
    .then(function(r){ return r.json(); })
    .then(function(resp) {
      if (resp.error) throw new Error(resp.error.message);
      var text = (resp.content || []).map(function(b){ return b.text || ''; }).join('');
      trackCost('Vigil Morning Briefing', resp.usage.input_tokens, resp.usage.output_tokens);
      var parsed;
      try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
      catch(e) {
        output.innerHTML = '<div style="background:#111;border:1px solid #1A1A1A;border-radius:8px;padding:20px;font-size:13px;color:#999;line-height:1.8;white-space:pre-wrap">' + text + '</div>';
        thinkingBox.style.display = 'none'; btn.disabled = false; btn.textContent = 'Run Again';
        return;
      }
      renderBriefing(parsed);
      saveSession(parsed);
      thinkingBox.style.display = 'none'; btn.disabled = false; btn.textContent = 'Run Again';
      renderMemoryStats();
    })
    .catch(function(e) {
      output.innerHTML = '<div style="color:#E24B4A;padding:20px">Error: ' + e.message + '<br><br>Make sure your proxy is running on port 3000.</div>';
      thinkingBox.style.display = 'none'; btn.disabled = false; btn.textContent = 'Run Vigil Briefing';
    });
    }); // close wdPromise
  });
}

function renderBriefing(data) {
  var output = document.getElementById('briefing-output');
  var html = '';
  var cfc = { high:'#4ADE80', medium:'#C8A96E', low:'#F87171' };
  var sop = data.stateOfPlay || {};

  html += '<div style="background:#111;border:1px solid #1A1A1A;border-left:3px solid #C8A96E;border-radius:8px;padding:18px 22px;margin-bottom:20px">';
  html += '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:8px">State of play</div>';
  html += '<div style="font-size:15px;color:#CCC;line-height:1.75;margin-bottom:10px">' + (sop.summary || 'No data') + '</div>';
  html += '<div style="font-size:11px;color:#555">Confidence: <span style="color:' + (cfc[sop.confidence] || '#888') + '">' + ((sop.confidence || '').toUpperCase()) + '</span> - ' + (sop.confidenceReason || '') + '</div>';
  html += '</div>';

  if (data.acquisitions && data.acquisitions.length) {
    var sc = { not_started:'#555', in_progress:'#60A5FA', responded:'#C8A96E', meeting_set:'#4ADE80', proposal_sent:'#C084FC', stalled:'#F87171', won:'#4ADE80', lost:'#555' };
    html += '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid #1A1A1A">Active acquisitions</div>';

function toggleInsight(id) {
  var body = document.getElementById('body' + id);
  var chev = document.getElementById('chev' + id);
  if (body) body.classList.toggle('open');
  if (chev) chev.textContent = body && body.classList.contains('open') ? '^' : 'v';
}

function saveSession(data) {
  var session = { date: new Date().toISOString(), summary: data.stateOfPlay ? data.stateOfPlay.summary : '', insightCount: (data.acquisitions || []).length };
  memory.sessions.push(session);
  if (data.memoryUpdate) { memory.patterns.push(data.memoryUpdate); if (memory.patterns.length > 50) memory.patterns = memory.patterns.slice(-50); }
  if (memory.sessions.length > 100) memory.sessions = memory.sessions.slice(-100);
  saveMemory();
}

function openLogModal(id, title, presetOutcome) {
  logTarget = { id: id, title: title };
  document.getElementById('log-title').textContent = 'Log: ' + title.substring(0, 50);
  document.getElementById('log-notes').value = '';
  if (presetOutcome) document.getElementById('log-outcome').value = presetOutcome;
  document.getElementById('log-modal').classList.add('open');
}

function closeLogModal() { document.getElementById('log-modal').classList.remove('open'); logTarget = null; }

function saveLog() {
  if (!logTarget) return;
  var outcome = document.getElementById('log-outcome').value;
  var notes = document.getElementById('log-notes').value.trim();
  memory.feedback.push({ date: new Date().toISOString(), insightId: logTarget.id, insightTitle: logTarget.title, outcome: outcome, notes: notes });
  if (memory.feedback.length > 200) memory.feedback = memory.feedback.slice(-200);
  saveMemory(); closeLogModal(); renderMemoryStats();
  var card = document.getElementById(logTarget ? logTarget.id : '');
  if (card) { card.style.opacity = '0.5'; }
  alert('Logged to Vigil memory.');
}

function runResearchAgent() {
  var btn = document.getElementById('research-btn');
  var thinkingBox = document.getElementById('thinking-box');
  var output = document.getElementById('research-output');
  btn.disabled = true; btn.textContent = 'Thinking...';
  thinkingBox.style.display = 'block';
  output.innerHTML = '';
  setThinking('Vigil is auditing its own knowledge gaps...');

  loadKnowledgeData().then(function(data) {
    if (!data) {
      output.innerHTML = '<div style="color:#E24B4A;padding:20px">Failed to load data.json</div>';
      btn.disabled = false; btn.textContent = 'Research Agent';
      thinkingBox.style.display = 'none'; return;
    }
    var memCtx = buildMemoryContext();
    var dataCtx = buildDataContext(data);
    var today = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

    setThinking('Vigil is generating its research plan...');

    var prompt = 'You are Vigil, Deputy CMO for E-Group ICT Software Zrt. Do a self-audit of your knowledge gaps and generate a proactive research plan.\n\n' +
      'Today: ' + today + '\n\n' +
      'YOUR CURRENT KNOWLEDGE:\n' + dataCtx + '\n\n' +
      'YOUR MEMORY:\n' + memCtx + '\n\n' +
      'Audit everything you know. Be brutally honest about what is missing, stale, or assumed. Think about:\n' +
      '1. DATA GAPS - critical missing information that would change your reasoning\n' +
      '2. STALE DATA - information old enough to be inaccurate\n' +
      '3. MARKET INTEL - news about target companies, EU policy, competitor moves you should know about\n' +
      '4. ACQUISITION ACTIONS - research that would unblock the next step in each relationship\n' +
      '5. PROACTIVE IDEAS - things nobody asked you to do but that would genuinely help E-Group marketing\n\n' +
      'For each task, be specific about what you will search for and what you expect to find.\n\n' +
      'Respond ONLY with valid JSON:\n' +
      '{"selfAssessment":"2-3 sentences honest assessment of Vigils current knowledge quality, what is solid, what is weak, what is dangerous to assume",' +
      '"tasks":[{"id":"unique_id","category":"data_gap|stale_data|market_intel|acquisition_action|proactive_idea","priority":"critical|high|medium|low","title":"specific task title","rationale":"why this matters right now","searchQuery":"exact search query to use","expectedFindings":"what Vigil expects to find","wouldUnblock":"what this research enables","estimatedCost":"$0.02"}],' +
      '"vigilNote":"one thing Vigil wants Chris to know not covered by the tasks"}';

    fetch(PROXY + '/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 4000, messages: [{ role: 'user', content: prompt }] })
    })
    .then(function(r){ return r.json(); })
    .then(function(resp) {
      if (resp.error) throw new Error(resp.error.message);
      var text = (resp.content || []).map(function(b){ return b.text || ''; }).join('');
      trackCost('Vigil Research Plan', resp.usage.input_tokens, resp.usage.output_tokens);
      var plan;
      try { plan = JSON.parse(text.replace(/```json|```/g, '').trim()); }
      catch(e) { output.innerHTML = '<div style="color:#E24B4A;padding:20px">Parse error: ' + text.substring(0,300) + '</div>'; thinkingBox.style.display='none'; btn.disabled=false; btn.textContent='Research Agent'; return; }
      renderResearchPlan(plan);
      thinkingBox.style.display = 'none'; btn.disabled = false; btn.textContent = 'Research Agent';
    })
    .catch(function(e) {
      output.innerHTML = '<div style="color:#E24B4A;padding:20px">Error: ' + e.message + '</div>';
      thinkingBox.style.display = 'none'; btn.disabled = false; btn.textContent = 'Research Agent';
    });
  });
}

    html += '<span style="font-size:11px;color:#444;margin-left:auto">' + (task.estimatedCost || '') + '</span>';

    html += '<div style="background:#0D0D0D;border-radius:4px;padding:8px 12px;margin-bottom:8px"><div style="font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Search query</div><div style="font-size:12px;color:#C8A96E;font-family:monospace">' + (task.searchQuery || '') + '</div></div>';
    html += '<div style="font-size:12px;color:#666;margin-bottom:4px"><strong style="color:#555">Expects:</strong> ' + (task.expectedFindings || '') + '</div>';
    html += '<div style="font-size:12px;color:#666;margin-bottom:12px"><strong style="color:#555">Unlocks:</strong> ' + (task.wouldUnblock || '') + '</div>';

    html += '</div>';

  html += '<div style="display:flex;gap:10px;margin-top:8px">';

function toggleApprove(idx) {
  var task = (researchPlan.tasks || [])[idx];
  if (!task) return;
  var tid = task.id || 't' + idx;
  var btn = document.getElementById('approve' + idx);
  var card = document.getElementById('rtask' + idx);
  var already = approvedTasks.indexOf(tid) >= 0;
  if (already) {
    approvedTasks.splice(approvedTasks.indexOf(tid), 1);
    btn.textContent = 'Approve'; btn.classList.remove('approved');
    if (card) card.style.borderLeft = '';
  } else {
    approvedTasks.push(tid);
    btn.textContent = 'Approved'; btn.classList.add('approved');
    if (card) card.style.borderLeft = '3px solid #4ADE80';
  }
  document.getElementById('execute-btn').style.display = approvedTasks.length > 0 ? 'inline-block' : 'none';
}

function skipTask(tid) {
  var card = document.getElementById(tid);
  if (card) { card.style.opacity = '0.3'; card.style.pointerEvents = 'none'; }
}

function approveAll() {
  (researchPlan.tasks || []).forEach(function(task, i) {
    var tid = task.id || 't' + i;
    if (approvedTasks.indexOf(tid) < 0) toggleApprove(i);
  });
}

function executeApproved() {
  var execBtn = document.getElementById('execute-btn');
  execBtn.disabled = true; execBtn.textContent = 'Running...';
  var output = document.getElementById('research-output');
  var resultsDiv = document.createElement('div');
  resultsDiv.style.marginTop = '24px';
  resultsDiv.innerHTML = '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #1A1A1A">Research results</div>';
  output.appendChild(resultsDiv);

  var tasksToRun = (researchPlan.tasks || []).filter(function(t, i) {
    return approvedTasks.indexOf(t.id || 't' + i) >= 0;
  });

  function runNext(idx) {
    if (idx >= tasksToRun.length) {
      resultsDiv.innerHTML += '<div style="margin-top:16px;padding:14px 18px;background:#0D0D0D;border:1px solid #2A2A2A;border-radius:8px;font-size:13px;color:#888">Research complete. Review findings above. Vigil has saved key findings to memory for the next briefing.</div>';
      execBtn.disabled = false; execBtn.textContent = 'Run approved tasks';
      return;
    }
    var task = tasksToRun[idx];
    var taskDiv = document.createElement('div');
    taskDiv.style.cssText = 'background:#111;border:1px solid #1A1A1A;border-radius:8px;padding:14px 18px;margin-bottom:10px';
    taskDiv.innerHTML = '<div style="font-size:13px;font-weight:600;color:#EEE;margin-bottom:6px">' + task.title + '</div><div style="font-size:12px;color:#555">Researching...</div>';
    resultsDiv.appendChild(taskDiv);

    var searchPrompt = 'Search for: ' + task.searchQuery + '\n\nContext: ' + task.rationale + '\n\nReturn JSON only: {"findings":"2-3 paragraph summary","keyFacts":["fact1","fact2","fact3"],"dataJsonUpdate":"what should be added to knowledge base","urgency":"high|medium|low","confidence":"high|medium|low"}';

    fetch(PROXY + '/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1500, messages: [{ role: 'user', content: searchPrompt }] })
    })
    .then(function(r){ return r.json(); })
    .then(function(resp) {
      trackCost('Research: ' + task.title, resp.usage ? resp.usage.input_tokens : 0, resp.usage ? resp.usage.output_tokens : 0);
      var text = (resp.content || []).map(function(b){ return b.text || ''; }).join('');
      var result;
      try { result = JSON.parse(text.replace(/```json|```/g,'').trim()); }
      catch(e) { result = { findings: text, keyFacts: [], dataJsonUpdate: '', urgency: 'medium', confidence: 'low' }; }

      var rhtml = '<div style="font-size:13px;font-weight:600;color:#EEE;margin-bottom:8px">' + task.title + '</div>';
      rhtml += '<div style="font-size:13px;color:#888;line-height:1.6;margin-bottom:8px">' + (result.findings || '') + '</div>';
      if (result.keyFacts && result.keyFacts.length) {
        rhtml += '<div style="margin-bottom:8px">' + result.keyFacts.map(function(f){ return '<div style="font-size:12px;color:#AAA;padding:3px 0;border-bottom:1px solid #141414">- ' + f + '</div>'; }).join('') + '</div>';
      }
      if (result.dataJsonUpdate) {
        rhtml += '<div style="background:#0D1A0D;border-left:2px solid #4ADE80;padding:8px 12px;border-radius:0 4px 4px 0;font-size:12px;color:#4ADE80;margin-top:8px">Update needed: ' + result.dataJsonUpdate + '</div>';
      }
      taskDiv.innerHTML = rhtml;

      memory.patterns = memory.patterns || [];
      memory.patterns.push('[Research ' + new Date().toLocaleDateString() + '] ' + task.title + ': ' + (result.dataJsonUpdate || (result.findings || '').substring(0, 100)));
      if (memory.patterns.length > 50) memory.patterns = memory.patterns.slice(-50);
      saveMemory();

      setTimeout(function(){ runNext(idx + 1); }, 2000);
    })
    .catch(function(e) {
      taskDiv.innerHTML = '<div style="font-size:13px;color:#EEE;margin-bottom:4px">' + task.title + '</div><div style="font-size:12px;color:#E24B4A">Error: ' + e.message + '</div>';
      setTimeout(function(){ runNext(idx + 1); }, 1000);
    });
  }

  runNext(0);
}

init();
</script>
<script src="nav.js"></script>
</body>
</html>
