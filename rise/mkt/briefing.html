<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vigil — E-Group Marketing Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#080808;color:#EEE;min-height:100vh}
.topbar{background:#0A0A0A;border-bottom:1px solid #1A1A1A;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:24px}
.logo{font-size:18px;font-weight:900;color:#C8A96E;letter-spacing:-0.5px}
.vigil-name{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#444}
.nav-links{display:flex;gap:4px}
.nav-link{padding:6px 12px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#555;text-decoration:none;border-radius:4px;transition:color 0.2s}
.nav-link:hover{color:#999}
.nav-link.active{color:#C8A96E}
.cost-bar{display:flex;align-items:center;gap:20px;cursor:pointer;position:relative}
.cost-item{display:flex;flex-direction:column;align-items:flex-end}
.cost-val{font-size:13px;font-weight:600;color:#C8A96E}
.cost-lbl{font-size:9px;color:#444;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.cost-panel{display:none;position:absolute;top:52px;right:0;background:#0D0D0D;border:1px solid #1A1A1A;border-radius:8px;width:360px;padding:16px;z-index:200;max-height:400px;overflow-y:auto}
.cost-panel.open{display:block}
.cost-log-item{display:flex;justify-content:space-between;font-size:12px;color:#888;padding:6px 0;border-bottom:1px solid #141414}
.cost-log-item:last-child{border-bottom:none}
.cost-log-amt{color:#C8A96E;font-weight:600;flex-shrink:0;margin-left:12px}
.container{max-width:1000px;margin:0 auto;padding:32px}
.vigil-header{margin-bottom:32px}
.vigil-title{font-size:28px;font-weight:700;color:#EEE;margin-bottom:4px}
.vigil-sub{font-size:13px;color:#555}
.sync-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.sync-status{font-size:12px;color:#555}
.run-btn{padding:10px 24px;background:#C8A96E;color:#000;font-size:13px;font-weight:700;border:none;border-radius:6px;cursor:pointer;letter-spacing:0.5px;transition:background 0.2s}
.run-btn:hover{background:#D4B87E}
.run-btn:disabled{opacity:0.5;cursor:not-allowed}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #444;border-top-color:#C8A96E;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.thinking-box{background:#0D0D0D;border:1px solid #1A1A1A;border-radius:8px;padding:20px;margin-bottom:24px;display:none}
.thinking-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:8px}
.thinking-text{font-size:12px;color:#555;line-height:1.6;font-style:italic}
.section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid #1A1A1A}
.insight-card{background:#111;border:1px solid #1A1A1A;border-radius:8px;margin-bottom:12px;overflow:hidden}
.insight-head{padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer}
.insight-head:hover{background:#141414}
.insight-title{font-size:15px;font-weight:600;color:#EEE;margin-bottom:4px}
.insight-preview{font-size:13px;color:#888;line-height:1.5}
.insight-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.urgency-badge{font-size:10px;padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.u-high{background:#2E0D0D;color:#F87171}
.u-medium{background:#2E1E0D;color:#C8A96E}
.u-low{background:#1A1A1A;color:#666}
.u-watch{background:#0D1A2E;color:#60A5FA}
.u-drop{background:#1A1A1A;color:#444;text-decoration:line-through}
.chevron{font-size:12px;color:#444;margin-left:8px;transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.insight-body{display:none;padding:0 20px 20px;border-top:1px solid #141414}
.insight-body.open{display:block}
.reasoning-section{margin-top:16px}
.reasoning-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#444;margin-bottom:8px}
.fact-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#888;padding:5px 0;border-bottom:1px solid #0F0F0F;line-height:1.5}
.fact-item:last-child{border-bottom:none}
.fact-icon{flex-shrink:0;margin-top:1px}
.fact-verified{color:#4ADE80}
.fact-assumed{color:#C8A96E}
.fact-stale{color:#F87171}
.assumption-box{background:#0D0D0D;border-left:2px solid #C8A96E;padding:10px 14px;margin-top:12px;font-size:12px;color:#888;line-height:1.6;border-radius:0 4px 4px 0}
.change-box{background:#0D0D0D;border-left:2px solid #333;padding:10px 14px;margin-top:8px;font-size:12px;color:#666;line-height:1.6;border-radius:0 4px 4px 0}
.action-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.act-btn{padding:7px 14px;font-size:12px;border:1px solid #2A2A2A;border-radius:4px;background:transparent;cursor:pointer;color:#888;transition:all 0.15s}
.act-btn:hover{border-color:#C8A96E;color:#C8A96E}
.act-btn.primary{background:#C8A96E;border-color:#C8A96E;color:#000;font-weight:600}
.act-btn.primary:hover{background:#D4B87E}
.act-btn.danger{border-color:#E24B4A;color:#E24B4A}
.act-btn.danger:hover{background:#2E0D0D}
.log-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center}
.log-modal.open{display:flex}
.log-box{background:#0D0D0D;border:1px solid #2A2A2A;border-radius:10px;padding:24px;width:500px;max-width:90vw}
.log-box h3{font-size:16px;color:#EEE;margin-bottom:16px}
.log-textarea{width:100%;padding:10px 12px;background:#111;border:1px solid #2A2A2A;border-radius:5px;color:#EEE;font-size:13px;line-height:1.6;min-height:100px;resize:vertical;font-family:inherit}
.log-select{width:100%;padding:8px 12px;background:#111;border:1px solid #2A2A2A;border-radius:5px;color:#EEE;font-size:13px;margin-bottom:10px}
.log-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.memory-section{background:#0D0D0D;border:1px solid #1A1A1A;border-radius:8px;padding:16px;margin-top:32px}
.memory-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:12px}
.memory-stat{display:flex;justify-content:space-between;font-size:12px;color:#666;padding:4px 0;border-bottom:1px solid #0F0F0F}
.memory-stat:last-child{border-bottom:none}
.memory-val{color:#888}
.empty-state{text-align:center;padding:60px 20px;color:#333}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.empty-text{font-size:15px;line-height:1.6;margin-bottom:24px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div>
      <div class="logo">VIGIL</div>
      <div class="vigil-name">E-Group Intelligence</div>
    </div>
    <nav class="nav-links">
      <a href="briefing.html" class="nav-link active">Briefing</a>
      <a href="network.html" class="nav-link">Network</a>
      <a href="intelligence.html" class="nav-link">Intelligence</a>
      <a href="pipeline.html" class="nav-link">Pipeline</a>
    </nav>
  </div>
  <div style="position:relative">
    <div class="cost-bar" onclick="toggleCostPanel()">
      <div class="cost-item"><div class="cost-val" id="cost-session">$0.0000</div><div class="cost-lbl">Session</div></div>
      <div class="cost-item"><div class="cost-val" id="cost-month">$0.0000</div><div class="cost-lbl">Month</div></div>
      <div class="cost-item"><div class="cost-val" id="cost-total">$0.0000</div><div class="cost-lbl">All time</div></div>
    </div>
    <div class="cost-panel" id="cost-panel">
      <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:10px">API Cost Log</div>
      <div id="cost-log"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="vigil-header">
    <div class="vigil-title">Good morning, Chris.</div>
    <div class="vigil-sub" id="vigil-date">Loading...</div>
  </div>

  <div class="sync-row">
    <div class="sync-status" id="sync-status">Ready to run briefing</div>
    <button class="run-btn" id="run-btn" onclick="runBriefing()">▶ Run Vigil Briefing</button>
  </div>

  <div class="thinking-box" id="thinking-box">
    <div class="thinking-label">Vigil is thinking...</div>
    <div class="thinking-text" id="thinking-text">Reading knowledge graph...</div>
  </div>

  <div id="briefing-output"></div>
<div id="research-output"></div>

  <div class="memory-section" id="memory-section">
    <div class="memory-title">Vigil Memory</div>
    <div id="memory-stats"></div>
  </div>
</div>

<div class="log-modal" id="log-modal">
  <div class="log-box">
    <h3 id="log-title">Log action</h3>
    <select class="log-select" id="log-outcome">
      <option value="acted_positive">I acted on this — positive response</option>
      <option value="acted_neutral">I acted on this — no response yet</option>
      <option value="acted_negative">I acted on this — negative response</option>
      <option value="dismissed_valid">Dismissed — not relevant right now</option>
      <option value="dismissed_wrong">Dismissed — Vigil's reasoning was wrong</option>
      <option value="snoozed">Snooze for 30 days</option>
    </select>
    <textarea class="log-textarea" id="log-notes" placeholder="What happened? What did you do? What was the response? (Optional but helps Vigil learn)"></textarea>
    <div class="log-actions">
      <button class="act-btn" onclick="closeLogModal()">Cancel</button>
      <button class="act-btn primary" onclick="saveLog()">Save to Memory</button>
    </div>
  </div>
</div>

<script>
const PROXY = 'http://localhost:3000';
const DATA_URL = 'https://hoarhouse.github.io/v3/rise/mkt/data.json';
const COST_KEY = 'vigil-cost-v1';
const MEMORY_KEY = 'vigil-memory-v1';
const DATA_CACHE_KEY = 'vigil-data-cache-v1';
const INPUT_PRICE = 3.00 / 1_000_000;
const OUTPUT_PRICE = 15.00 / 1_000_000;

let costs = { session: 0, month: 0, total: 0, log: [] };
let memory = { sessions: [], insights: [], feedback: [], patterns: [], created: new Date().toISOString() };
let knowledgeData = null;
let currentInsights = [];
let logTarget = null;

// ── INIT ──────────────────────────────────────────────────────────────────────

async function init() {
  document.getElementById('vigil-date').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  await loadCosts();
  await loadMemory();
  renderCosts();
  renderMemoryStats();
  document.addEventListener('click', e => {
    if (!e.target.closest('.cost-bar') && !e.target.closest('.cost-panel'))
      document.getElementById('cost-panel').classList.remove('open');
  });
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────

async function loadKnowledgeData() {
  try {
    const cached = localStorage.getItem(DATA_CACHE_KEY);
    if (cached) {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < 60 * 60 * 1000) return data;
    }
    const res = await fetch(DATA_URL + '?v=' + Date.now());
    const data = await res.json();
    localStorage.setItem(DATA_CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
    return data;
  } catch(e) { return null; }
}

// ── COST TRACKING ─────────────────────────────────────────────────────────────

async function loadCosts() {
  try {
    const r = localStorage.getItem(COST_KEY);
    if (r) {
      const saved = JSON.parse(r);
      costs.total = saved.total || 0;
      costs.log = saved.log || [];
      const thisMonth = new Date().toISOString().slice(0,7);
      costs.month = costs.log.filter(l => l.ts?.startsWith(thisMonth)).reduce((s,l) => s + l.cost, 0);
    }
  } catch(e) {}
}

function saveCosts() {
  localStorage.setItem(COST_KEY, JSON.stringify({ total: costs.total, log: costs.log.slice(-500) }));
}

function trackCost(label, inp, out) {
  const cost = (inp * INPUT_PRICE) + (out * OUTPUT_PRICE);
  costs.session += cost; costs.month += cost; costs.total += cost;
  costs.log.push({ ts: new Date().toISOString(), label, inp, out, cost });
  saveCosts(); renderCosts(); return cost;
}

function fmt(n) { return '$' + n.toFixed(4); }

function renderCosts() {
  document.getElementById('cost-session').textContent = fmt(costs.session);
  document.getElementById('cost-month').textContent = fmt(costs.month);
  document.getElementById('cost-total').textContent = fmt(costs.total);
  const recent = costs.log.slice(-15).reverse();
  document.getElementById('cost-log').innerHTML = recent.length
    ? recent.map(l => `<div class="cost-log-item"><div><div style="color:#CCC;font-size:12px">${l.label}</div><div style="color:#444;font-size:11px">${new Date(l.ts).toLocaleTimeString()} · ${l.inp}in / ${l.out}out</div></div><div class="cost-log-amt">${fmt(l.cost)}</div></div>`).join('')
    : '<div style="font-size:12px;color:#444;padding:8px 0">No calls yet</div>';
}

function toggleCostPanel() { document.getElementById('cost-panel').classList.toggle('open'); }

// ── MEMORY ────────────────────────────────────────────────────────────────────

async function loadMemory() {
  try {
    const r = localStorage.getItem(MEMORY_KEY);
    if (r) memory = JSON.parse(r);
  } catch(e) {}
}

function saveMemory() {
  localStorage.setItem(MEMORY_KEY, JSON.stringify(memory));
}

function renderMemoryStats() {
  const stats = document.getElementById('memory-stats');
  const totalSessions = memory.sessions.length;
  const totalFeedback = memory.feedback.length;
  const actedOn = memory.feedback.filter(f => f.outcome.startsWith('acted')).length;
  const dismissed = memory.feedback.filter(f => f.outcome.startsWith('dismissed')).length;
  const lastSession = memory.sessions[memory.sessions.length - 1];
  stats.innerHTML = [
    ['Total Vigil sessions', totalSessions || 0],
    ['Insights logged to memory', memory.insights.length || 0],
    ['Feedback entries', totalFeedback || 0],
    ['Actions taken on insights', actedOn || 0],
    ['Insights dismissed', dismissed || 0],
    ['Last session', lastSession ? new Date(lastSession.date).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) : 'First session today'],
  ].map(([k,v]) => `<div class="memory-stat"><span>${k}</span><span class="memory-val">${v}</span></div>`).join('');
}

function buildMemoryContext() {
  if (!memory.sessions.length) return 'This is the first Vigil session. No prior memory exists.';
  const recentSessions = memory.sessions.slice(-5);
  const recentFeedback = memory.feedback.slice(-20);
  const patterns = memory.patterns.slice(-10);
  let ctx = `VIGIL MEMORY — ${memory.sessions.length} prior sessions.\n\n`;
  if (recentFeedback.length) {
    ctx += 'FEEDBACK ON PAST INSIGHTS (what worked, what did not):\n';
    recentFeedback.forEach(f => {
      ctx += `- [${f.outcome}] "${f.insightTitle}" — ${f.notes || 'no notes'} (${new Date(f.date).toLocaleDateString()})\n`;
    });
    ctx += '\n';
  }
  if (patterns.length) {
    ctx += 'PATTERNS VIGIL HAS NOTICED:\n';
    patterns.forEach(p => { ctx += `- ${p}\n`; });
    ctx += '\n';
  }
  if (recentSessions.length) {
    ctx += 'RECENT SESSION SUMMARIES:\n';
    recentSessions.forEach(s => {
      ctx += `- ${new Date(s.date).toLocaleDateString()}: ${s.summary}\n`;
    });
  }
  return ctx;
}

// ── MAIN BRIEFING ─────────────────────────────────────────────────────────────

async function runBriefing() {
  const btn = document.getElementById('run-btn');
  const thinkingBox = document.getElementById('thinking-box');
  const output = document.getElementById('briefing-output');
  btn.disabled = true; btn.textContent = '⟳ Running...';
  thinkingBox.style.display = 'block';
  output.innerHTML = '';

  setThinking('Loading knowledge graph and memory...');
  knowledgeData = await loadKnowledgeData();
  if (!knowledgeData) {
    output.innerHTML = '<div style="color:#E24B4A;padding:20px">Failed to load data.json — make sure the file is deployed.</div>';
    btn.disabled = false; btn.textContent = '▶ Run Vigil Briefing';
    thinkingBox.style.display = 'none';
    return;
  }

  setThinking('Building context from knowledge graph...');
  const memoryContext = buildMemoryContext();
  const dataContext = buildDataContext(knowledgeData);

  setThinking('Vigil is reasoning about your situation...');
  const prompt = buildBriefingPrompt(dataContext, memoryContext);

  try {
    const res = await fetch(PROXY + '/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content.map(b => b.text || '').join('');
    trackCost('Vigil Morning Briefing', data.usage.input_tokens, data.usage.output_tokens);

    let parsed;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      output.innerHTML = `<div style="background:#111;border:1px solid #1A1A1A;border-radius:8px;padding:20px;font-size:13px;color:#999;line-height:1.8;white-space:pre-wrap">${text}</div>`;
      thinkingBox.style.display = 'none';
      btn.disabled = false; btn.textContent = '▶ Run Again';
      return;
    }

    currentInsights = parsed.insights || [];
    renderBriefing(parsed);
    saveSession(parsed);
  } catch(e) {
    output.innerHTML = `<div style="color:#E24B4A;padding:20px">Error: ${e.message}<br><br>Make sure your proxy is running on port 3000.</div>`;
  }

  thinkingBox.style.display = 'none';
  btn.disabled = false; btn.textContent = '▶ Run Again';
  renderMemoryStats();
}

function setThinking(text) {
  document.getElementById('thinking-text').textContent = text;
}

function buildDataContext(d) {
  const companies = (d.companies || []).map(c =>
    `[${c.id}] ${c.name} (${c.type}, ${c.country}) — Connection: ${c.connection} — Opportunity: ${c.opportunity} — Notes: ${c.notes}`
  ).join('\n');

  const people = (d.people || []).map(p =>
    `[${p.id}] ${p.name}, ${p.title} at ${p.company} (warmth: ${p.warmth}) — ${p.connection} — Action: ${p.action}`
  ).join('\n');

  const consortiums = (d.consortiums || []).map(c =>
    `[${c.id}] ${c.name} — Role: ${c.role} — ${c.notes}`
  ).join('\n');

  const events = (d.events || []).sort((a,b) => new Date(b.date) - new Date(a.date)).map(e =>
    `[${e.date}] [${e.type.toUpperCase()}] ${e.description} (Source: ${e.source})`
  ).join('\n');

  const actions = (d.actions || []).filter(a => a.status === 'pending').map(a =>
    `[${a.priority.toUpperCase()}] ${a.task} — Owner: ${a.owner}`
  ).join('\n');

  return `COMPANIES IN NETWORK:\n${companies}\n\nKEY PEOPLE:\n${people}\n\nCONSORTIUMS:\n${consortiums}\n\nEVENT LOG (most recent first):\n${events}\n\nOPEN ACTIONS:\n${actions}`;
}

function buildBriefingPrompt(dataContext, memoryContext) {
  return `You are Vigil — the AI Deputy Chief Marketing Officer for E-Group ICT Software Zrt. You report directly to Chris Hoar, who leads E-Group's marketing strategy.

Chris's job is to:
- Build E-Group's pipeline of new enterprise clients across EU, USA and China
- Manage and deepen relationships with E-Group's ~20 existing large enterprise clients
- Execute the marketing strategy including outreach, content, thought leadership, events and pilots
- Oversee the Vigil intelligence platform and the E-Group website
- Work with Antal Kuthy (CEO), Feri (COO) and the engineering team

E-Group context:
- Budapest-based AI infrastructure company, est. 1993, 110+ staff, 50 AI engineers
- Products: Rise AI platform (in pilot), Essence organisational intelligence, MyD Wallet (Hungary's national EUDI Wallet), KAÜ national digital identity, GraDPaLM medical AI
- Key clients: European Space Agency (photo verification), Hungarian Government (KAÜ + neonatal tracking)
- Consortium positions: Co-leads IPCEI-CIS WS3 + AI Cluster, DOME member, HeliX spearhead (leads), eIDAS MyD Wallet implementer
- Partner: Kellton (MoU signed for sovereign AI stack)
- The Rise platform is the flagship product being piloted internally — every demo and journal entry builds toward first external client

Today's date: ${new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}.

YOUR FULL KNOWLEDGE BASE:
${dataContext}

YOUR MEMORY FROM PRIOR SESSIONS:
${memoryContext}

YOUR TASK:
Produce a structured morning briefing for Chris. Be direct, specific and honest. Do not pad. Do not be vague. If something is uncertain say so. If something has been sitting untouched too long, say so. If Vigil thinks an action should be dropped, say so and why.

Think critically — do not assume signals or opportunities from previous sessions are still valid. Re-evaluate everything fresh.

Respond ONLY with valid JSON in exactly this structure:

{
  "stateOfPlay": {
    "summary": "Honest 2-3 sentence macro assessment. Where does E-Group marketing actually stand today? What is the overall momentum — building, stalled, or losing ground?",
    "confidence": "high|medium|low",
    "confidenceReason": "why that confidence level — what data is complete vs missing"
  },
  "acquisitions": [
    {
      "target": "Company or person name",
      "goal": "What we are trying to achieve with them",
      "status": "not_started|in_progress|responded|meeting_set|proposal_sent|stalled|won|lost",
      "daysSinceActivity": "number or null if never started",
      "lastActivity": "what actually happened last — or 'No contact made yet'",
      "vigil_assessment": "Vigil's honest read — is this still worth pursuing? Is the approach right? Is the timing right?",
      "nextAction": "Specific action. Who does what. By when.",
      "urgency": "high|medium|low|drop",
      "facts": [
        { "text": "fact used", "source": "where from", "confidence": "verified|assumed|stale" }
      ],
      "wouldChangeIf": ["what new info would change this assessment"]
    }
  ],
  "marketIntelligence": [
    {
      "title": "Specific thing Chris needs to know",
      "why_it_matters": "Direct relevance to E-Group — be specific",
      "source": "where this comes from",
      "date": "when",

function saveSession(data) {
  const session = {
    date: new Date().toISOString(),
    summary: data.sessionSummary,
    insightCount: data.insights?.length || 0,
    insightIds: (data.insights || []).map(i => i.id)
  };
  memory.sessions.push(session);

  // Save insights to memory for feedback tracking
  (data.insights || []).forEach(ins => {
    if (!memory.insights.find(i => i.id === ins.id)) {
      memory.insights.push({ id: ins.id, title: ins.title, type: ins.type, date: new Date().toISOString() });
    }
  });

  // Save memory update note
  if (data.memoryUpdate) {
    memory.patterns.push(data.memoryUpdate);
    if (memory.patterns.length > 50) memory.patterns = memory.patterns.slice(-50);
  }

  // Trim sessions to last 100
  if (memory.sessions.length > 100) memory.sessions = memory.sessions.slice(-100);
  if (memory.insights.length > 500) memory.insights = memory.insights.slice(-500);

  saveMemory();
}

// ── RESEARCH AGENT ────────────────────────────────────────────────────────────

async function runResearchAgent() {
  const btn = document.getElementById('research-btn');
  const output = document.getElementById('research-output');
  const thinkingBox = document.getElementById('thinking-box');
  btn.disabled = true; btn.textContent = '⟳ Thinking...';
  thinkingBox.style.display = 'block';
  output.innerHTML = '';

  setThinking('Vigil is auditing its own knowledge gaps...');
  const data = await loadKnowledgeData();
  if (!data) { btn.disabled = false; btn.textContent = '▶ Research Agent'; thinkingBox.style.display = 'none'; return; }

  const memCtx = buildMemoryContext();
  const dataCtx = buildDataContext(data);

  setThinking('Vigil is generating its research plan...');

  const prompt = buildResearchPlanPrompt(dataCtx, memCtx);
  try {
    const res = await fetch(PROXY + '/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const resp = await res.json();
    if (resp.error) throw new Error(resp.error.message);
    const text = resp.content.map(b => b.text || '').join('');
    trackCost('Vigil Research Plan', resp.usage.input_tokens, resp.usage.output_tokens);

    let plan;
    try {
      plan = JSON.parse(text.replace(/```json|```/g, '').trim());
    } catch(e) {
      output.innerHTML = '<div style="color:#E24B4A;padding:20px">Failed to parse research plan. Raw: ' + text.substring(0,200) + '</div>';
      btn.disabled = false; btn.textContent = '▶ Research Agent';
      thinkingBox.style.display = 'none';
      return;
    }

    renderResearchPlan(plan);
  } catch(e) {
    output.innerHTML = '<div style="color:#E24B4A;padding:20px">Error: ' + e.message + '</div>';
  }
  thinkingBox.style.display = 'none';
  btn.disabled = false; btn.textContent = '▶ Research Agent';
}

function buildResearchPlanPrompt(dataCtx, memCtx) {
  return 'You are Vigil — Deputy CMO for E-Group ICT Software Zrt. You are doing a self-audit of your own knowledge gaps and generating a proactive research plan.' +
    'Today: ' + new Date().toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long',year:'numeric'}) + '.' +
    'YOUR CURRENT KNOWLEDGE:' + dataCtx +
    'YOUR MEMORY:' + memCtx +
    'YOUR TASK: Audit everything you know. Be brutally honest about what is missing, stale, or assumed. Then generate a prioritised research plan.' +
    'Think about:' +
    '1. DATA GAPS — what critical information is completely missing that would change how you reason' +
    '2. STALE DATA — what information is old enough that it may no longer be accurate' +
    '3. MARKET INTEL — what is happening right now in target company news, EU policy, competitor moves that you should know about' +
    '4. ACQUISITION ACTIONS — based on where each relationship stands, what specific research would unblock the next step' +
    '5. PROACTIVE IDEAS — things nobody asked you to do but that you think would genuinely help E-Group marketing right now' +
    'For each proposed task, be specific about what you will search for and what you expect to find.' +
    'Respond ONLY with valid JSON:' +
    '{' +
    '"selfAssessment": "2-3 sentences: honest assessment of the current state of Vigils knowledge. What is solid, what is weak, what is dangerous to assume.",' +
    '"tasks": [' +
    '{' +
    '"id": "unique string",' +
    '"category": "data_gap|stale_data|market_intel|acquisition_action|proactive_idea",' +
    '"priority": "critical|high|medium|low",' +
    '"title": "Specific task title",' +
    '"rationale": "Why this matters right now. Be specific.",' +
    '"searchQuery": "Exact search query Vigil will use",' +
    '"expectedFindings": "What Vigil expects to find and how it will change the knowledge base",' +
    '"wouldUnblock": "What decision or action this research would enable",' +
    '"estimatedCost": "$0.02"' +
    '}' +
    '],' +
    '"vigilNote": "One thing Vigil wants Chris to know that is not covered by any of the above tasks"' +
    '}';
}

      '<div style="font-size:13px;color:#888;line-height:1.6;margin-bottom:8px">' + (task.rationale||'') + '</div>' +
      '<div style="background:#0D0D0D;border-radius:4px;padding:8px 12px;margin-bottom:8px">' +
      '<div style="font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Search query</div>' +
      '<div style="font-size:12px;color:#C8A96E;font-family:monospace">' + (task.searchQuery||'') + '</div>' +
      '</div>' +
      '<div style="font-size:12px;color:#666;margin-bottom:8px"><strong style="color:#555">Expects to find:</strong> ' + (task.expectedFindings||'') + '</div>' +
      '<div style="font-size:12px;color:#666;margin-bottom:12px"><strong style="color:#555">Would unblock:</strong> ' + (task.wouldUnblock||'') + '</div>' +

function toggleApprove(idx, taskId, btn) {
  const task = researchPlan.tasks.find((t,i) => (t.id||'t'+i) === taskId || i === idx);
  const alreadyApproved = approvedTasks.includes(taskId);
  if (alreadyApproved) {
    approvedTasks = approvedTasks.filter(id => id !== taskId);
    btn.textContent = 'Approve';
    btn.classList.remove('approved');
    document.getElementById('rtask-' + idx).style.borderColor = '';
  } else {
    approvedTasks.push(taskId);
    btn.textContent = 'Approved ✓';
    btn.style.background = '#4ADE80';
    btn.style.borderColor = '#4ADE80';
    btn.style.color = '#000';
    document.getElementById('rtask-' + idx).style.borderLeft = '3px solid #4ADE80';
  }
  const execBtn = document.getElementById('execute-btn');
  execBtn.style.display = approvedTasks.length > 0 ? 'block' : 'none';
}

function skipTask(idx) {
  const card = document.getElementById('rtask-' + idx);
  if (card) { card.style.opacity = '0.3'; card.style.pointerEvents = 'none'; }
}

function approveAll() {
  (researchPlan.tasks || []).forEach((task, i) => {
    const id = task.id || 't' + i;
    if (!approvedTasks.includes(id)) {
      const btn = document.getElementById('approve-' + i);
      if (btn) toggleApprove(i, id, btn);
    }
  });
}

async function executeApproved() {
  const execBtn = document.getElementById('execute-btn');
  execBtn.disabled = true; execBtn.textContent = 'Running...';
  const output = document.getElementById('research-output');
  const resultsDiv = document.createElement('div');
  resultsDiv.style.marginTop = '24px';
  resultsDiv.innerHTML = '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #1A1A1A">Research results</div>';
  output.appendChild(resultsDiv);

  const tasksToRun = (researchPlan.tasks || []).filter((t, i) => approvedTasks.includes(t.id || 't' + i));

  for (let i = 0; i < tasksToRun.length; i++) {
    const task = tasksToRun[i];
    const taskDiv = document.createElement('div');
    taskDiv.style.cssText = 'background:#111;border:1px solid #1A1A1A;border-radius:8px;padding:14px 18px;margin-bottom:10px';
    taskDiv.innerHTML = '<div style="font-size:13px;font-weight:600;color:#EEE;margin-bottom:6px">' + task.title + '</div>' +
      '<div style="font-size:12px;color:#555">Researching...</div>';
    resultsDiv.appendChild(taskDiv);

    try {
      const searchRes = await fetch(PROXY + '/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{
            role: 'user',
            content: 'You are Vigil, E-Group marketing intelligence system. Research this specific query and return findings as structured JSON.' +
              'Search query: ' + task.searchQuery +
              'Context: ' + task.rationale +
              'Return JSON: { "findings": "2-3 paragraph summary of what you found", "keyFacts": ["fact1","fact2","fact3"], "dataJsonUpdate": "one sentence describing what should be added to data.json", "urgency": "high|medium|low", "confidence": "high|medium|low" }'
          }]
        })
      });
      const searchData = await searchRes.json();
      trackCost('Research: ' + task.title, searchData.usage?.input_tokens || 0, searchData.usage?.output_tokens || 0);
      const text = (searchData.content || []).map(b => b.text || '').join('');
      let result;
      try { result = JSON.parse(text.replace(/```json|```/g, '').trim()); }
      catch(e) { result = { findings: text, keyFacts: [], dataJsonUpdate: '', urgency: 'medium', confidence: 'low' }; }

      taskDiv.innerHTML = '<div style="font-size:13px;font-weight:600;color:#EEE;margin-bottom:8px">' + task.title + '</div>' +
        '<div style="font-size:13px;color:#888;line-height:1.6;margin-bottom:8px">' + (result.findings||'') + '</div>' +
        (result.keyFacts && result.keyFacts.length ? '<div style="margin-bottom:8px">' + result.keyFacts.map(f => '<div style="font-size:12px;color:#AAA;padding:3px 0;border-bottom:1px solid #141414">● ' + f + '</div>').join('') + '</div>' : '') +
        (result.dataJsonUpdate ? '<div style="background:#0D1A0D;border-left:2px solid #4ADE80;padding:8px 12px;border-radius:0 4px 4px 0;font-size:12px;color:#4ADE80;margin-top:8px">data.json update: ' + result.dataJsonUpdate + '</div>' : '');

      // Save finding to memory
      memory.patterns = memory.patterns || [];
      memory.patterns.push('[Research ' + new Date().toLocaleDateString() + '] ' + task.title + ': ' + (result.dataJsonUpdate || result.findings?.substring(0,100)));
      if (memory.patterns.length > 50) memory.patterns = memory.patterns.slice(-50);
      saveMemory();

    } catch(e) {
      taskDiv.innerHTML = '<div style="font-size:13px;color:#EEE;margin-bottom:4px">' + task.title + '</div><div style="font-size:12px;color:#E24B4A">Error: ' + e.message + '</div>';
    }

    // Small delay between calls
    if (i < tasksToRun.length - 1) await new Promise(r => setTimeout(r, 2000));
  }

  resultsDiv.innerHTML += '<div style="margin-top:16px;padding:14px 18px;background:#0D0D0D;border:1px solid #2A2A2A;border-radius:8px;font-size:13px;color:#888">Research complete. Review findings above and update data.json manually for anything Vigil found that should be permanent knowledge. Vigil has saved key findings to memory for the next briefing.</div>';
  execBtn.disabled = false; execBtn.textContent = 'Run approved tasks';
}

</script>
<script src="nav.js"></script>
</body>
</html>
