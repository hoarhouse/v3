<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Group Network Intelligence — Marketing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #080808; color: #EEEEEE; min-height: 100vh; }
  .header { padding: 28px 40px 20px; border-bottom: 1px solid #1E1E1E; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-e { font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; font-size: 22px; color: #C8A96E; }
  .header-title { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #888; }
  .last-updated { font-size: 11px; color: #555; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 40px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat { background: #111; border: 1px solid #1E1E1E; border-radius: 8px; padding: 16px; }
  .stat-n { font-size: 28px; font-weight: 700; color: #C8A96E; }
  .stat-l { font-size: 11px; color: #666; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid #1E1E1E; }
  .tab { padding: 10px 20px; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; border: none; background: transparent; cursor: pointer; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: #C8A96E; border-bottom-color: #C8A96E; }
  .panel { display: none; }
  .panel.active { display: block; }
  .search { width: 100%; padding: 10px 14px; font-size: 14px; background: #111; border: 1px solid #1E1E1E; border-radius: 6px; color: #EEE; margin-bottom: 12px; outline: none; }
  .search:focus { border-color: #C8A96E; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { font-size: 11px; padding: 5px 12px; border: 1px solid #2A2A2A; border-radius: 4px; background: transparent; cursor: pointer; color: #666; letter-spacing: 1px; text-transform: uppercase; }
  .filter-btn.on { border-color: #C8A96E; color: #C8A96E; }
  .card { background: #111; border: 1px solid #1E1E1E; border-radius: 8px; padding: 16px 20px; margin-bottom: 10px; }
  .card.highlight { border-left: 3px solid #C8A96E; }
  .card.hot { border-left: 3px solid #E24B4A; }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-name { font-size: 15px; font-weight: 600; color: #EEE; }
  .card-sub { font-size: 12px; color: #555; margin-top: 3px; }
  .card-body { margin-top: 12px; font-size: 13px; color: #888; line-height: 1.7; border-top: 1px solid #1A1A1A; padding-top: 12px; }
  .card-body strong { color: #AAA; }
  .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
  .badge-client { background: #0D2E1E; color: #4ADE80; }
  .badge-ws3 { background: #2E1E0D; color: #C8A96E; font-weight: 700; }
  .badge-target { background: #1A1A2E; color: #818CF8; }
  .badge-partner { background: #1E1A2E; color: #C084FC; }
  .badge-consortium { background: #0D1E2E; color: #60A5FA; }
  .badge-mapped { background: #0D2E1E; color: #4ADE80; }
  .badge-pending { background: #2A1A1A; color: #F87171; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #444; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #1A1A1A; }
  .action-card { background: #111; border: 1px solid #1E1E1E; border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .dot-high { background: #E24B4A; }
  .dot-med { background: #EF9F27; }
  .dot-low { background: #555; }
  .action-task { font-size: 14px; color: #CCC; }
  .action-owner { font-size: 11px; color: #555; margin-top: 4px; letter-spacing: 0.5px; }
  .empty { text-align: center; padding: 48px; color: #444; font-size: 14px; }
  @media (max-width: 600px) { .stats { grid-template-columns: repeat(2,1fr); } .container { padding: 20px; } .header { padding: 20px; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-e">E</div>
    <div class="header-title">Network Intelligence</div>
  </div>
  <div class="last-updated" id="lastUpdated">Loading...</div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-clients">0</div><div class="stat-l">Existing clients</div></div>
    <div class="stat"><div class="stat-n" id="s-warm">0</div><div class="stat-l">Warm leads</div></div>
    <div class="stat"><div class="stat-n" id="s-people">0</div><div class="stat-l">Key people</div></div>
    <div class="stat"><div class="stat-n" id="s-actions">0</div><div class="stat-l">Open actions</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('companies',this)">Companies</button>
    <button class="tab" onclick="showTab('people',this)">Key people</button>
    <button class="tab" onclick="showTab('consortiums',this)">Consortiums</button>
    <button class="tab" onclick="showTab('actions',this)">Actions</button>
  </div>

  <div id="panel-companies" class="panel active">
    <input class="search" id="co-search" type="text" placeholder="Search companies..." oninput="renderCompanies()" />
    <div class="filter-row">
      <button class="filter-btn on" data-type="all" onclick="setFilter(this)">All</button>
      <button class="filter-btn" data-type="client" onclick="setFilter(this)">Clients</button>
      <button class="filter-btn" data-type="warm" onclick="setFilter(this)">WS3 warm</button>
      <button class="filter-btn" data-type="target" onclick="setFilter(this)">IPCEI peers</button>
      <button class="filter-btn" data-type="partner" onclick="setFilter(this)">Partners</button>
    </div>
    <div id="company-list"></div>
  </div>

  <div id="panel-people" class="panel">
    <input class="search" id="pe-search" type="text" placeholder="Search people..." oninput="renderPeople()" />
    <div id="people-list"></div>
  </div>

  <div id="panel-consortiums" class="panel">
    <div id="consortium-list"></div>
  </div>

  <div id="panel-actions" class="panel">
    <div id="actions-list"></div>
  </div>
</div>

<script>
const KEY = 'egroup-network-v1';

const FALLBACK = {
  lastUpdated: new Date().toISOString(),
  companies: [
    { id:'c1', name:'European Space Agency (ESA)', type:'client', sector:'SpaceTech / GovTech', country:'International', connection:'Active project — photo verification system', opportunity:'Expand into AI verification, data intelligence, sovereign data services', notes:'Flagship reference. ESA photo verification must be front-page on website and all marketing.' },
    { id:'c2', name:'Hungarian Government', type:'client', sector:'GovTech / HealthTech', country:'Hungary', connection:'KAÜ national digital identity + neonatal baby tracking project', opportunity:'Expand AI services into additional ministries and public health bodies', notes:'Two crown jewel projects. Neonatal tracking is a powerful human story.' },
    { id:'c3', name:'4iG Nyrt.', type:'warm', sector:'ICT / Telecoms / Space', country:'Hungary', connection:'Fellow Hungarian IPCEI-CIS participant. László Blénessy met Antal Kuthy at Ministry reception Dec 2023.', opportunity:'Joint AI infrastructure, data sovereignty, co-selling into shared government clients', notes:'Hungary\'s largest ICT group. Very warm — CEO-level personal connection.' },
    { id:'c4', name:'CloudFerro', type:'warm', sector:'Cloud / Space Data', country:'Poland', connection:'WS3 workshop partner — attended E-Group Budapest HQ IPCEI-CIS/8ra workshop', opportunity:'Federated cloud + AI data processing collaboration.', notes:'Attended E-Group\'s own Budapest workshop. Also has ESA connection.' },
    { id:'c5', name:'ENEA', type:'warm', sector:'Research / Energy / HealthTech', country:'Italy', connection:'WS3 workshop partner — attended E-Group Budapest HQ workshop', opportunity:'Joint research initiatives, HealthTech AI, energy sector AI', notes:'Italian national research agency. HealthTech and energy — both E-Group target sectors.' },
    { id:'c6', name:'Engineering Ingegneria Informatica', type:'warm', sector:'Enterprise IT / AI', country:'Italy', connection:'WS3 workshop partner — attended E-Group Budapest HQ workshop', opportunity:'Enterprise AI, digital transformation, potential reseller relationship', notes:'~12,000 staff. One of Italy\'s largest IT companies.' },
    { id:'c7', name:'Infobip', type:'warm', sector:'Communications / CPaaS', country:'Croatia (global)', connection:'WS3 workshop partner — attended E-Group Budapest HQ workshop', opportunity:'Communication infrastructure for Rise delivery routing. Also potential AI client.', notes:'Global CPaaS platform. CEE-headquartered. Could partner on Rise delivery AND be a client.' },
    { id:'c8', name:'Reply', type:'warm', sector:'Enterprise IT / Consulting', country:'Italy (EU-wide)', connection:'WS3 workshop attendee AND direct IPCEI-CIS participant.', opportunity:'Joint delivery of AI infrastructure projects across EU enterprise clients', notes:'~15,000 staff. Double connection — both direct IPCEI participant and Budapest workshop attendee. High priority.' },
    { id:'c9', name:'Tiscali Italia', type:'target', sector:'Telecom / Cloud', country:'Italy', connection:'Fellow direct IPCEI-CIS participant. WS3 workshop attendee.', opportunity:'Federated cloud services, sovereign AI for Italian market', notes:'Building GenAI model for European languages via IPCEI-CIS.' },
    { id:'c10', name:'TIM Group', type:'target', sector:'Telecom / Cloud', country:'Italy', connection:'WS3 workshop attendee. Fellow IPCEI-CIS participant.', opportunity:'Enterprise AI for Italian enterprise across FinTech and GovTech', notes:'Major Italian telecom. Attended Budapest workshop.' },
    { id:'c11', name:'Gdańsk University of Technology', type:'target', sector:'Research / Academic', country:'Poland', connection:'WS3 workshop attendee. Hosted 8ra General Assembly March 2025.', opportunity:'Research partnership, academic credibility, joint EU funding bids', notes:'Hosted the 8ra General Assembly. Key academic partner.' },
    { id:'c12', name:'Deutsche Telekom', type:'target', sector:'Telecom / Cloud / Enterprise', country:'Germany', connection:'Fellow direct IPCEI-CIS participant', opportunity:'Enterprise AI for one of Europe\'s largest enterprise client bases.', notes:'T-Systems subsidiary serves large enterprise — potential reseller/integrator path.' },
    { id:'c13', name:'SAP', type:'target', sector:'Enterprise Software / Cloud', country:'Germany', connection:'Fellow direct IPCEI-CIS participant', opportunity:'Integration of Rise/Essence with SAP enterprise systems.', notes:'E-Group knowledge graph could plug into SAP ecosystem. Long-term strategic target.' },
    { id:'c14', name:'Orange', type:'target', sector:'Telecom / Cloud', country:'France', connection:'Fellow direct IPCEI-CIS participant', opportunity:'Sovereign cloud + AI for French enterprise and public sector', notes:'Strong public sector relationships. Open-source cloud ambitions align with E-Group.' },
    { id:'c15', name:'Siemens', type:'target', sector:'Industrial / Manufacturing / Edge', country:'Germany', connection:'Fellow direct IPCEI-CIS participant', opportunity:'AI intelligence for industrial operations, manufacturing sector Rise deployment', notes:'Building edge-IoT intelligence via IPCEI. E-Group AI infrastructure could serve industrial clients.' },
    { id:'c16', name:'Kellton', type:'partner', sector:'Enterprise AI / Systems Integration', country:'India / International', connection:'MoU signed — sovereign AI stack for European enterprise', opportunity:'Joint go-to-market for EU enterprise AI.', notes:'Strategic commercial partner. MoU already signed. Key for EU + international expansion.' },
    { id:'c17', name:'Leaseweb Global', type:'target', sector:'Cloud / Hosting', country:'Netherlands', connection:'Fellow direct IPCEI-CIS participant', opportunity:'Cloud infrastructure partnership for Rise deployment at scale', notes:'Major EU cloud/hosting provider. IPCEI-CIS peer.' },
    { id:'c18', name:'Telefónica España', type:'target', sector:'Telecom / Cloud', country:'Spain', connection:'Fellow direct IPCEI-CIS participant', opportunity:'Spanish and LatAm enterprise AI market entry', notes:'One of Europe\'s largest telecoms. Long-term strategic target.' },
  ],
  people: [
    { id:'p1', name:'Antal Kuthy', initials:'AK', company:'E-Group', title:'Founder & CEO', warmth:'internal', notes:'Primary strategic voice. Hosted IPCEI-CIS WS3 workshop at Budapest HQ. Met László Blénessy (4iG) at Ministry reception Dec 2023.', actions:'Build personal thought leadership programme. Target 8–12 speaking slots 2026.' },
    { id:'p2', name:'Feri', initials:'F', company:'E-Group', title:'COO', warmth:'internal', notes:'Marketing plan owner. Driving farming/hunting strategy and pilot programmes.', actions:'Provide full client list with billing context and decision-maker names.' },
    { id:'p3', name:'Mark Mariosi', initials:'MM', company:'E-Group', title:'AI Research', warmth:'internal', notes:'AI research lead. Key voice for HealthTech credibility.', actions:'Author medical AI thought leadership piece Q2 2026.' },
    { id:'p4', name:'Dr. Péter Antal', initials:'PA', company:'E-Group', title:'Chief Scientist / Medical AI', warmth:'internal', notes:'Led GraDPaLM to back-to-back international first place.', actions:'Publish thought leadership on medical AI. Secure conference speaking slots.' },
    { id:'p5', name:'László Blénessy', initials:'LB', company:'4iG Nyrt.', title:'Deputy Group CEO', warmth:'hot', notes:'Met Antal Kuthy at Hungarian Ministry reception December 2023 when both companies received IPCEI-CIS certification together. Very warm personal connection at CEO level.', actions:'Priority: Antal to reach out directly for strategic conversation about collaboration.' },
    { id:'p6', name:'Gergely Fábián', initials:'GF', company:'Hungarian Government', title:'Secretary of State — Industrial Policy & Technology', warmth:'warm', notes:'Received both Antal Kuthy and László Blénessy at the Ministry when IPCEI-CIS was approved. Government champion for E-Group.', actions:'Maintain relationship. Invite to E-Group events. Potential advocate for expanding government contracts.' },
  ],
  consortiums: [
    { id:'con1', name:'IPCEI-CIS / 8ra', fullName:'Important Project of Common European Interest — Cloud Infrastructure & Services', role:'Direct participant — FedEU.ai. Co-lead Workstream 3. Leads the AI Cluster.', status:'Active', membersResearched:true, members:'19 direct participants: Deutsche Telekom, Telefónica España, Atos, Orange, SAP, Reply, TIM, Oktawave, Atende Industries, OpenNebula Systems, Arsys, Leaseweb, 4iG, E-Group, Tiscali, CloudFerro, Siemens, Fincantieri, Engineering Ingegneria Informatica. WS3 Budapest workshop attendees (hottest leads): CloudFerro, ENEA, Engineering, Infobip, Reply, Tiscali, TIM Group, Gdańsk University of Technology.', notes:'E-Group co-leads WS3 and leads the AI Cluster — a position of authority within the consortium. Most powerful warm network available.' },
    { id:'con2', name:'EU DOME', fullName:'Data Spaces and Federated Cloud — EU Initiative', role:'Hungary representative (2024)', status:'Active', membersResearched:false, members:'Research pending', notes:'Public participant list available. Research task pending.' },
    { id:'con3', name:'HeliX + FedX', fullName:'Health Data Space + Federated Data Exchange', role:'Participant / builder', status:'Active', membersResearched:false, members:'Research pending', notes:'HealthTech consortium. Connected to GraDPaLM medical AI work.' },
    { id:'con4', name:'eIDAS 2.0', fullName:'European Digital Identity Framework', role:'MyD Wallet implementation', status:'Active', membersResearched:false, members:'Research pending', notes:'Deep EU digital identity ecosystem. Every participant is a potential client.' },
  ],
  actions: [
    { id:'a1', priority:'high', task:'Antal to contact László Blénessy (4iG Deputy CEO) — warm personal connection from Dec 2023 Ministry reception', owner:'Antal Kuthy', status:'pending' },
    { id:'a2', priority:'high', task:'Get full client list + billing context from Feri — all 20 clients, direct or subcontract?', owner:'Chris', status:'pending' },
    { id:'a3', priority:'high', task:'Add ESA photo verification story prominently to website homepage', owner:'Chris', status:'pending' },
    { id:'a4', priority:'high', task:'Add neonatal baby tracking story to website', owner:'Chris', status:'pending' },
    { id:'a5', priority:'high', task:'Build outreach profiles for WS3 Budapest workshop attendees (CloudFerro, ENEA, Engineering, Infobip, Reply, Tiscali, TIM)', owner:'Chris + Claude', status:'pending' },
    { id:'a6', priority:'medium', task:'Research EU DOME public participant list', owner:'Claude', status:'pending' },
    { id:'a7', priority:'medium', task:'Define paid AI discovery pilot offer — price, scope, deliverables — and create landing page', owner:'Chris + Feri', status:'pending' },
    { id:'a8', priority:'medium', task:'Research HeliX + FedX consortium member organisations', owner:'Claude', status:'pending' },
    { id:'a9', priority:'medium', task:'Research eIDAS 2.0 ecosystem participant organisations', owner:'Claude', status:'pending' },
    { id:'a10', priority:'medium', task:'Build decision-maker profiles for Deutsche Telekom, SAP, Orange', owner:'Claude', status:'pending' },
    { id:'a11', priority:'medium', task:'Design exclusive sovereign AI community — 30–50 person invite-only forum anchored by Antal', owner:'Chris + Feri', status:'pending' },
    { id:'a12', priority:'low', task:'Research Kellton leadership team for deeper relationship mapping', owner:'Claude', status:'pending' },
  ]
};

let state = FALLBACK;
let activeFilter = 'all';

function typeLabel(t) { return {client:'Client',warm:'WS3 warm',target:'IPCEI peer',partner:'Partner',consortium:'Consortium'}[t]||t; }

function render() {
  const d = new Date(state.lastUpdated);
  document.getElementById('lastUpdated').textContent = 'Updated ' + d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('s-clients').textContent = state.companies.filter(c=>c.type==='client').length;
  document.getElementById('s-warm').textContent = state.companies.filter(c=>c.type==='warm'||c.type==='target').length;
  document.getElementById('s-people').textContent = state.people.length;
  document.getElementById('s-actions').textContent = state.actions.filter(a=>a.status==='pending').length;
  renderCompanies(); renderPeople(); renderConsortiums(); renderActions();
}

function renderCompanies() {
  const q = (document.getElementById('co-search')||{}).value||'';
  const list = document.getElementById('company-list');
  const warm = state.companies.filter(c=>c.type==='warm');
  const rest = state.companies.filter(c=>c.type!=='warm');
  let items = [...warm,...rest].filter(c=>{
    const mT = activeFilter==='all'||c.type===activeFilter;
    const mQ = !q||c.name.toLowerCase().includes(q.toLowerCase())||(c.notes||'').toLowerCase().includes(q.toLowerCase());
    return mT&&mQ;
  });
  if(!items.length){list.innerHTML='<div class="empty">No companies found.</div>';return;}
  list.innerHTML=items.map(c=>`<div class="card${c.type==='warm'?' highlight':''}">
    <div class="card-head">
      <div><div class="card-name">${c.name}</div><div class="card-sub">${c.sector} · ${c.country}</div></div>
      <span class="badge badge-${c.type==='warm'?'ws3':c.type}">${typeLabel(c.type)}</span>
    </div>
    <div class="card-body">
      <div style="margin-bottom:6px"><strong>Connection:</strong> ${c.connection}</div>
      <div style="margin-bottom:6px"><strong>Opportunity:</strong> ${c.opportunity}</div>
      ${c.notes?`<div style="font-style:italic;color:#666">${c.notes}</div>`:''}
    </div>
  </div>`).join('');
}

function renderPeople() {
  const q = (document.getElementById('pe-search')||{}).value||'';
  const list = document.getElementById('people-list');
  const ext = state.people.filter(p=>p.warmth!=='internal');
  const int = state.people.filter(p=>p.warmth==='internal');
  let items = [...ext,...int].filter(p=>!q||p.name.toLowerCase().includes(q.toLowerCase())||(p.company||'').toLowerCase().includes(q.toLowerCase()));
  const bg={hot:'#2E0D0D',warm:'#2E1E0D',internal:'#0D1E2E'};
  const co={hot:'#F87171',warm:'#C8A96E',internal:'#60A5FA'};
  list.innerHTML=items.map(p=>`<div class="card${p.warmth==='hot'?' hot':''}">
    <div style="display:flex;gap:14px;align-items:flex-start">
      <div class="avatar" style="background:${bg[p.warmth]||'#1A1A1A'};color:${co[p.warmth]||'#888'}">${p.initials}</div>
      <div style="flex:1">
        <div class="card-name">${p.name}</div>
        <div class="card-sub">${p.title} · ${p.company}</div>
        ${p.notes?`<div style="font-size:13px;color:#888;margin-top:8px;line-height:1.6">${p.notes}</div>`:''}
        ${p.actions?`<div style="font-size:12px;color:#555;margin-top:8px;padding-top:8px;border-top:1px solid #1A1A1A"><strong style="color:#777">Next action:</strong> ${p.actions}</div>`:''}
      </div>
    </div>
  </div>`).join('');
}

function renderConsortiums() {
  const list = document.getElementById('consortium-list');
  list.innerHTML=state.consortiums.map(c=>`<div class="card">
    <div class="card-head">
      <div><div class="card-name">${c.name}</div><div class="card-sub">${c.fullName}</div></div>
      <span class="badge badge-${c.membersResearched?'mapped':'pending'}">${c.membersResearched?'Mapped':'Pending'}</span>
    </div>
    <div class="card-body">
      <div style="margin-bottom:6px"><strong>E-Group role:</strong> ${c.role}</div>
      ${c.membersResearched?`<div style="margin-bottom:6px"><strong>Members:</strong> ${c.members}</div>`:''}
      <div style="font-style:italic;color:#666">${c.notes}</div>
    </div>
  </div>`).join('');
}

function renderActions() {
  const list = document.getElementById('actions-list');
  const high = state.actions.filter(a=>a.priority==='high'&&a.status==='pending');
  const med = state.actions.filter(a=>a.priority==='medium'&&a.status==='pending');
  const low = state.actions.filter(a=>a.priority==='low'&&a.status==='pending');
  let html='';
  const row=(a,cls)=>`<div class="action-card"><div class="priority-dot ${cls}"></div><div><div class="action-task">${a.task}</div><div class="action-owner">Owner: ${a.owner}</div></div></div>`;
  if(high.length){html+='<div class="section-label">High priority</div>';html+=high.map(a=>row(a,'dot-high')).join('');}
  if(med.length){html+='<div class="section-label">Medium priority</div>';html+=med.map(a=>row(a,'dot-med')).join('');}
  if(low.length){html+='<div class="section-label">Low priority</div>';html+=low.map(a=>row(a,'dot-low')).join('');}
  list.innerHTML=html||'<div class="empty">No open actions.</div>';
}

function showTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  activeFilter=btn.dataset.type;
  renderCompanies();
}

render();
</script>
</body>
</html>
